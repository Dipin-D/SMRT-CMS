<div class="student-list-shell">
    <h2 class="section-title-clean">Quizzes for {{ class_shell.course_name }}</h2>

    <div class="student-item-grid">
        {% for quiz in quizzes %}
        <article class="student-item-card">
            <div>
                <h3>{{ quiz.title }}</h3>
            </div>
            <a href="{% url 'student:attempt_quiz' class_shell_id=class_shell.id quiz_id=quiz.id %}" class="student-item-action">
                <i class="fas fa-play"></i> Attempt
            </a>
        </article>
        {% empty %}
        <p class="empty-note">No quizzes available at the moment.</p>
        {% endfor %}
    </div>
</div>
